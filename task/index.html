<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register Form</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="left">
      <div class="left-content">
        <h1>Hello<br>World.</h1>
        <p>Lorem ipsum dolor sit amet, consectetur adipisicing.</p>
      </div>
    </div>

    <div class="right">
      <h2>Register</h2>
      <p class="subtitle">
        Do you have an account? <a href="login.html">Login with your account</a>
      </p>

      <form>
        <div class="form-group">
          <label>Name</label>
          <input type="text" />
        </div>

        <div class="form-group">
          <label>Email ID</label>
          <input type="email" />
        </div>

        <div class="form-group">
          <label>Phone No</label>
          <input type="text" placeholder="+994123456789" />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" value="" />
        </div>

        <div class="checkbox-group">
          <input type="radio" />
          <span>I accept terms and conditions & privacy policy</span>
        </div>

        <button class="btn" type="submit">Register</button>
      </form>

      <p class="social-text">Login with social media</p>
      <div class="social-buttons">
        <a href="facebook.html" class="facebook">Facebook</a>
        <a href="twitter.html" class="twitter">Twitter</a>
        <a href="google.html" class="google">Google+</a>
      </div>
    </div>
  </div>
</body>
</html>
