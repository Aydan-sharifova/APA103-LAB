<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Page</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #efeff1;
    }

    .login-box {
      width: 500px;
      background: #f8f8f8;
      padding: 50px 45px 40px;
      border-radius: 18px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    .login-box h1 {
      text-align: center;
      font-size: 42px;
      color: #333;
      margin-bottom: 40px;
      font-weight: 500;
    }

    .form-group {
      margin-bottom: 28px;
    }

    .form-group label {
      display: block;
      font-size: 18px;
      color: #444;
      margin-bottom: 12px;
    }

    .form-group input {
      width: 100%;
      height: 54px;
      border: 1px solid #d6d6d6;
      border-radius: 8px;
      padding: 0 16px;
      font-size: 16px;
      outline: none;
      background: #fafafa;
    }

    .form-group input::placeholder {
      color: #9a9a9a;
    }

    .login-btn {
      width: 100%;
      height: 54px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(to right, #ff2d75, #ff4b3e);
      color: white;
      font-size: 17px;
      cursor: pointer;
      margin-top: 5px;
    }

    .forgot-password {
      text-align: right;
      margin-top: 22px;
    }

    .forgot-password a {
      text-decoration: none;
      color: #2f6fb3;
      font-size: 16px;
    }

    .forgot-password a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Login</h1>

    <form>
      <div class="form-group">
        <label for="email">Email ID</label>
        <input type="email" id="email" placeholder="Enter your email" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" />
      </div>

      <button type="submit" class="login-btn">LOGIN</button>

      <div class="forgot-password">
        <a href="#">Forgot password?</a>
      </div>
    </form>
  </div>
</body>
</html>
